buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 29
        compileSdkVersion = 36
        targetSdkVersion = 36
        kotlinVersion = "2.1.20"
        excludeAppGlideModule = true
        androidx_lifecycle_version = "2.8.6"
        playServicesVersion = "18+"
        firebaseMessagingVersion = "21.0.0"
        androidXCore = "1.6.0"
        androidXBrowser = "1.3.0"

        ndkVersion = "27.3.13750724"

        jacksonVersion = "2.17.3"
        okhttpVersion = "4.12.0"
        securityCryptoVersion = "1.1.0"
    }
    repositories {
        maven { url "https://nexus.rnd.mendix.com/repository/repo1-proxy/" }
        maven { url "https://packages.rnd.mendix.com/jcenter" }
        google()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle'
        classpath "com.facebook.react:react-native-gradle-plugin"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
        classpath 'org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.2.10'
        apply from: file("../node_modules/mendix-native/android/mendix.gradle"); applyMendixClassPaths(project)

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}


project.ext {
    set('react-native', [
            versions: [
                // Override Firebase BOM version to avoid updating to react-native-firebase 20.2.0+,
                // which adds many new node_modules increasing the size significantly.
                // Affected dependencies include the entire react-native-firebase suite e.g.:
                // @react-native-firebase/app, @react-native-firebase/analytics, @react-native-firebase/crashlytics, @react-native-firebase/messaging
                // NOTE: If updating to react-native-firebase 20.2.0+ is done, this override should be removed.
                    firebase: [
                            bom: "33.1.1"
                    ],
            ],
    ])
}

allprojects {
    repositories {
        maven {
            url "$rootDir/../node_modules/@notifee/react-native/android/libs"
        }
        maven { url "https://nexus.rnd.mendix.com/repository/repo1-proxy/" }
        maven { url "https://nexus.rnd.mendix.com/repository/jitpack-proxy/" }
        maven { url "https://packages.rnd.mendix.com/jcenter" }
        google()

        // Build all modules with Android 16KB pages enabled
        plugins.withId('com.android.application') {
            android {
                defaultConfig {
                    externalNativeBuild {
                        cmake {
                            arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
                        }
                    }
                }
            }
        }

        plugins.withId('com.android.library') {
            android {
                defaultConfig {
                    externalNativeBuild {
                        cmake {
                            arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
                        }
                    }
                }
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
